plugins:
  - rubocop-performance
  - rubocop-rake
  - rubocop-rspec

AllCops:
  NewCops: enable
  TargetRubyVersion: 3.2

Layout/EndOfLine:
  EnforcedStyle: lf

Style/Documentation:
  Enabled: false

Gemspec/DevelopmentDependencies:
  Enabled: false

RSpec/DescribeClass:
  Exclude:
    - spec/acceptance/**/*

RSpec/ExampleLength:
  Exclude:
    - spec/acceptance/**/*

RSpec/MultipleExpectations:
  Exclude:
    - spec/unit/**/*

RSpec/SpecFilePathFormat:
  Exclude:
    - spec/unit/**/*

Metrics/MethodLength:
  Exclude:
    - spec/acceptance/**/*
